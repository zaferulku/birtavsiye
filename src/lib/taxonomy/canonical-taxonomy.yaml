# ============================================================
# SPECIAL RULES
# ============================================================
special_rules:

  reject_patterns:
    - "\\bikinci el\\b"
    - "\\b2\\.\\s*el\\b"
    - "\\bkullanılmış\\b"
    - "\\bdefolu\\b"
    - "\\bhasarlı\\b"
    - "\\baçık kutu\\b"
    - "\\bteşhir\\b"
    - "\\boutlet\\b"
    - "\\byenilenmiş\\b"
    - "\\brefurbished\\b"

  accessory_indicators:
    - "için"
    - "uyumlu"
    - "ile kullanılabilen"
    - "compatible with"

  accessory_only_brands:
    - PDX
    - Renksan
    - Ulanzi
    - Borofone
    - Smcase
