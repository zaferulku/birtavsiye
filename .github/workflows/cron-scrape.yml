name: Cron — Scrape (MM + PttAVM + Vatan rotation)

# 4 saatte bir tetiklenir → 6 run/gün → 46 query rotation ~8 günde komple tur.
# Manuel tetikleme: GitHub Actions UI → "Run workflow" hâlâ aktif.
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call Vercel cron endpoint
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.birtavsiye.net/api/cron/scrape"
