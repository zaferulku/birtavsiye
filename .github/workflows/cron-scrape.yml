name: Cron — Scrape (DISABLED, manual only)

# NOT: Faz 1 sırasında Gemini kotasını korumak için schedule kapalı.
# Manuel tetikleme: GitHub Actions UI → "Run workflow"
on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call Vercel cron endpoint
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://birtavsiye.net/api/cron/scrape"
