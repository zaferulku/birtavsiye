name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Lint fail-soft: src/ 81 + scripts/ 173 pre-existing error (P6.12 borç).
        # Build kritik gate, lint developer feedback için log-only.
        # Yerel `npm run lint` tüm projeyi tarar.
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # Build için minimum placeholder env (server validation skip için)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: placeholder
          CRON_SECRET: placeholder
          INTERNAL_API_SECRET: placeholder
