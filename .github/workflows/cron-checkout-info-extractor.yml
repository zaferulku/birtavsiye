name: Cron — Checkout Info Extractor

on:
  schedule:
    - cron: '24 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call cron endpoint
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.birtavsiye.net/api/cron/checkout-info-extractor"
